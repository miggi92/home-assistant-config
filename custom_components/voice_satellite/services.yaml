wake:
  name: Wake
  description: >-
    Trigger the satellite as if a wake word were detected. Skips wake-word
    listening and goes directly to STT. Works regardless of the wake-word
    detection mode (including Disabled).
  target:
    entity:
      integration: voice_satellite
      domain: assist_satellite

show:
  name: Show
  description: >-
    Run a prompt through the satellite's Assist pipeline and display the
    response in the voice satellite overlay. Plays the wake chime, optionally
    speaks the response, and keeps the bubble on screen until dismissed
    (stop word or double tap) or until the configured duration elapses.
    Designed for scheduled tasks like a morning briefing.
  target:
    entity:
      integration: voice_satellite
      domain: assist_satellite
  fields:
    prompt:
      name: Prompt
      description: >-
        Text sent to the Assist pipeline as if the user had spoken it. The
        LLM response is what the satellite displays.
      required: true
      example: What's the weather forecast for today?
      selector:
        text:
          multiline: true
    silent:
      name: Silent
      description: >-
        When true (default), only display the response. When false, also speak
        it through the satellite's TTS engine.
      default: true
      example: false
      selector:
        boolean:
    pipeline:
      name: Pipeline
      description: >-
        Which pipeline runs the prompt. Pass 1 or 2 to use the matching
        wake-word slot's pipeline, or pass an exact pipeline name. Defaults
        to slot 1.
      example: 1
      default: 1
      selector:
        text:
    duration:
      name: Duration
      description: >-
        Seconds to display the response before auto-dismissing. 0 (default)
        keeps the bubble on screen until the user dismisses it manually
        (stop word or double tap).
      default: 0
      example: 60
      selector:
        number:
          min: 0
          max: 86400
          mode: box
          unit_of_measurement: s

set_screensaver:
  name: Set screensaver
  description: >-
    Update the satellite's screensaver settings live. The change is pushed
    to each connected browser, persisted in its local panel config, and
    applied immediately. Useful for scheduling different screensaver
    behaviors from automations (e.g. black screen at night to reduce
    tablet heat, media kiosk during the day).
  target:
    entity:
      integration: voice_satellite
      domain: assist_satellite
  fields:
    type:
      name: Screensaver type
      description: >-
        Which screensaver to show after the idle timeout. "black" is a
        solid dark overlay (combine with a low brightness percentage in
        the panel for the strongest thermal savings). "media" uses the
        image/video/folder selected in the panel. "website" embeds the
        URL configured in the panel. "clock" shows a large digital time
        and date.
      required: true
      example: black
      selector:
        select:
          options:
            - black
            - media
            - website
            - clock

start_timer:
  name: Start timer
  description: >-
    Create a named timer on a satellite from an automation or script. The
    timer behaves identically to a voice-created one: countdown pill on the
    overlay, alert tone when it fires, and cancel from the card UI.
  target:
    entity:
      integration: voice_satellite
      domain: assist_satellite
  fields:
    name:
      name: Name
      description: Label shown on the countdown pill (e.g. "Stir the sauce").
      required: true
      example: Stir the sauce
      selector:
        text:
    hours:
      name: Hours
      description: Hours portion of the duration. Combine with minutes/seconds.
      example: 0
      default: 0
      selector:
        number:
          min: 0
          max: 24
          mode: box
          unit_of_measurement: h
    minutes:
      name: Minutes
      description: Minutes portion of the duration.
      example: 5
      default: 0
      selector:
        number:
          min: 0
          max: 59
          mode: box
          unit_of_measurement: min
    seconds:
      name: Seconds
      description: Seconds portion of the duration.
      example: 0
      default: 0
      selector:
        number:
          min: 0
          max: 59
          mode: box
          unit_of_measurement: s
