---
# AWTRIX 3 Delete App Notif
awtrix3delapp:
  alias: awtrix3DelApp
  description: ""
  mode: queued
  max: 10
  fields:
    device_prefix:
      name: DevicePrefix
      description: MQTT Prefix der Awtrix
      required: false
      default: "awtrix_50ccb4"
      selector:
        text: null
    app_id:
      name: AppId
      description: App ID der Benachrichtigung
      required: true
      selector:
        text: null
  sequence:
    - alias: PublishEmptyPayloadToDeleteApp
      action: mqtt.publish
      data:
        topic: "{{ device_prefix }}/custom/{{ app_id }}"
        payload: ""
