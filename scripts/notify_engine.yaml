---
#####
# Notifications engine - adapted from CCOSTAN
# Original Repo : https://github.com/CCOSTAN/Home-AssistantConfig
#####
notify_engine:
  alias: "NotifyEngine"
  icon: mdi:bell-ring
  description: "Notification engine."
  fields:
    title:
      selector:
        text: null
      name: Title
      description: Title of the notification
      required: true
    value1:
      selector:
        text:
          multiline: true
      name: Message part 1
      description: Notification content part 1
      required: true
    value2:
      selector:
        text:
          multiline: true
      name: Message part 2
      description: Notification content part 2
    value3:
      selector:
        text:
          multiline: true
      name: Message part 3
      description: Notification content part 3
    who:
      selector:
        text:
          multiline: true
      default: home
      name: Who
      description: Who should the notification go to? (Comma-separated for multiple recipients)
    photo:
      selector:
        object: null
      name: Foto
      description: Photo URL
    group:
      selector:
        text: null
      name: Group
      description: Group
    tag_id:
      selector:
        select:
          options:
            - information
            - alert
      default: information
      name: Tag
      description: Tag ID
    inline_keyboard:
      selector:
        object: null
      name: Inline keyboard
      description: Option to reply directly to messages
    actions:
      selector:
        object: null
      name: Actions
      description: Actions
    icon:
      selector:
        text: null
      name: Icon
      description: Icon

  mode: parallel
  sequence:
    - variables:
        channel_services:
          home: notify.telegram_bot_home
          sig_home: notify.signalhome
          mobile_app_miguel: notify.mobile_app_pixel_9_pro
          telegram_miguel: notify.telegram_bot_miguel
          mobile_app_silke: notify.mobile_app_sm_s911b
          telegram_silke: notify.telegram_bot_silke
          work: notify.html5_work_laptop_hp
          tv: notify.gtv
          tv_overlay: notify.tvoverlaynotify
          family: notify.signalfamily
          home_audio: notify.wohnung_durchsagen
        user_channel_selectors:
          miguel: input_select.miguel_notification_channel
          silke: input_select.silke_notification_channel
        recipient_list: "{{ (who | default('miguel')).split(',') | map('trim') | list }}"
        message: "{{ value1 }} {{ value2 }} {{ value3 }}"
        telegram_chatids:
          home: !secret telegram_home_group
          telegram_miguel: !secret telegram_miguel
          telegram_silke: !secret telegram_silke
        server_url: "{{ states('input_text.serverurl') }}"

    - parallel:
        - repeat:
            for_each: "{{ recipient_list }}"
            sequence:
              - condition: template
                alias: "Check if notifications are allowed for recipient"
                value_template: >
                  {% set recipient = repeat.item %}
                  {% if recipient == 'home_audio' %}
                    {{ is_state('input_boolean.audible_notifications', 'on') }}
                  {% else %}
                    {% if not is_state('input_boolean.text_notifications', 'on') %}
                      false
                    {% else %}
                      {% set mute_switch = 'input_boolean.notifications_' ~ recipient %}
                      {% if recipient in ['tv', 'tv_overlay', 'work', 'home', 'sig_home', 'family'] %}
                        true
                      {% elif states(mute_switch) is not none %}
                        {{ is_state(mute_switch, 'on') }}
                      {% else %}
                        true
                      {% endif %}
                    {% endif %}
                  {% endif %}
              - variables:
                  recipient: "{{ repeat.item }}"
                  notifier: >
                    {% set selector = user_channel_selectors.get(recipient) %}
                    {% if selector %}
                      {% set selected_channel = states(selector) %}
                      {{ channel_services.get(selected_channel) | default('notify.miguel_telegram') }}
                    {% else %}
                      {{ channel_services.get(recipient) | default('notify.miguel_telegram') }}
                    {% endif %}
                  chatid: "{{ telegram_chatids.get(recipient) }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ recipient == 'home_audio' }}"
                        alias: "Condition for audio notifications"
                    sequence:
                      - action: notify.send_message
                        alias: "Send audio notification"
                        target:
                          entity_id: "{{ notifier }}"
                        data:
                          message: "{{ message }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ 'telegram' in notifier }}"
                        alias: "Condition for Telegram"
                    sequence:
                      - if:
                          - condition: template
                            value_template: "{{ photo is defined }}"
                            alias: "Check if photo is defined"
                        then:
                          - if:
                              - condition: template
                                value_template: "{{ photo.path.startswith(('http://', 'https://')) }}"
                                alias: "Check if photo is a URL"
                            then:
                              - action: telegram_bot.send_photo
                                alias: "Send Telegram photo via URL"
                                data:
                                  verify_ssl: false
                                  config_entry_id: 01JZ6NS8C75P2K898VAJVFV86K
                                  caption: "{{ photo.caption | replace('|', '\\|') | replace('-', '\\-') }}"
                                  url: "{{ photo.path }}"
                                  chat_id:
                                    - "{{ chatid }}"
                            else:
                              - action: telegram_bot.send_photo
                                alias: "Send Telegram photo via file path"
                                data:
                                  verify_ssl: false
                                  config_entry_id: 01JZ6NS8C75P2K898VAJVFV86K
                                  caption: "{{ photo.caption | replace('|', '\\|') | replace('-', '\\-') }}"
                                  file: "{{ photo.path }}"
                                  chat_id:
                                    - "{{ chatid }}"
                        else:
                          - action: notify.send_message
                            alias: "Send Telegram text message"
                            target:
                              entity_id: "{{ notifier }}"
                            data:
                              message: "{{ message }}"
                              title: "{{ title }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ recipient == 'tv' }}"
                        alias: "Condition for TV"
                    sequence:
                      - action: "{{ notifier }}"
                        alias: "Send Notification to TV"
                        data:
                          title: "{{ title }}"
                          message: "{{ message }}"
                          data:
                            position: "top-right"
                            image:
                              url: "{{ photo.path if photo is defined else '' }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ 'signal' in notifier }}"
                        alias: "Condition for Signal"
                    sequence:
                      - action: "{{ notifier }}"
                        alias: "Signal notification"
                        data:
                          message: >-
                            **{{ title }}**

                            {{ message }}
                          data: >
                            {% set payload = {} %}
                            {% set payload = dict(payload, **{'text_mode': 'styled'}) %}
                            {% if photo is defined and photo %}
                              {% set payload = dict(payload, **{'attachments': [photo]}) %}
                            {% endif %}
                            {{ payload }}
                  - conditions:
                      - condition: template
                        value_template: "{{ recipient == 'tv_overlay' }}"
                        alias: "Condition for TV Overlay"
                    sequence:
                      - action: notify.tvoverlaynotify
                        alias: "Send TV Overlay notification"
                        data:
                          title: "{{ title }}"
                          message: "{{ message }}"
                          data:
                            appTitle: "{{ group if group is defined else '' }}"
                            seconds: 15
                            image: "{{ photo.path if photo is defined else '' }}"
                default:
                  - variables:
                      notification_payload: >
                        {% set d = namespace(data={}) %}
                        {% if group is defined and group %}
                          {% set d.data = dict(d.data, group=group) %}
                        {% endif %}
                        {% if tag_id is defined and tag_id %}
                          {% set d.data = dict(d.data, tag=tag_id) %}
                        {% endif %}
                        {% if icon is defined and icon %}
                          {% set d.data = dict(d.data, notification_icon=icon) %}
                        {% endif %}
                        {% if photo is defined and photo %}
                          {% set d.data = dict(d.data, image=photo.path) %}
                        {% endif %}
                        {% if actions is defined and actions %}
                          {% set d.data = dict(d.data, actions=actions) %}
                        {% endif %}
                        {{ d.data }}

                  - action: "{{ notifier }}"
                    alias: "Default notification"
                    data:
                      title: "{{ title }}"
                      message: "{{ message }}"
                      data: "{{ notification_payload }}"

        - alias: "Duplicate notification logic"
          sequence:
            - condition: template
              value_template: "{{ who != 'tv' and who != 'work' and who != 'tv_overlay' }}"
              alias: "Only duplicate if not specific device"
            - variables:
                duplications:
                  - who: tv
                    condition: "{{ who != 'tv' }}"
                    device: device_tracker.gtv
                    media_check: media_player.gtv
                  - who: work
                    condition: "{{ who != 'work' }}"
                    device: device_tracker.bcwmc5cg4100cy0
                  - who: tv_overlay
                    condition: "{{ who != 'tv_overlay' }}"
                    device: device_tracker.1und1_box
                    media_check: media_player.fernseher_im_wohnzimmer
            - repeat:
                for_each: "{{ duplications }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ repeat.item.condition }}"
                        alias: "Condition matches"
                      - condition: template
                        value_template: "{{ states(repeat.item.device) == 'home' }}"
                        alias: "Check if device is home"
                      - condition: and
                        alias: "Check mediaplayer state if defined"
                        conditions:
                          - condition: template
                            value_template: >
                              {% if repeat.item.media_check is defined %}
                                {{ states(repeat.item.media_check) != 'unavailable' and states(repeat.item.media_check) != 'off' }}
                              {% else %}
                                true
                              {% endif %}
                            alias: "Mediaplayer is available and not off"
                    then:
                      - action: script.notify_engine
                        alias: "Call script again for duplicates"
                        data:
                          title: "{{ title }}"
                          value1: "{{ value1 }}"
                          value2: "{{ value2 | default('') }}"
                          value3: "{{ value3 | default('') }}"
                          who: "{{ repeat.item.who }}"
                          group: "{{ group | default('') }}"
                          photo: "{{ photo | default('') }}"
                          tag_id: "{{ tag_id | default('') }}"
