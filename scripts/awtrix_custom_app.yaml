---
# AWTRIX 3 Notifications
awtrix3customapp:
  alias: awtrix3CustomApp
  mode: parallel
  max: 10
  fields:
    app_id:
      selector:
        text: null
      name: AppId
      description: App ID der Benachrichtigung
      required: true
    text:
      selector:
        text: null
      name: Text
      description: Text Benachrichtigung
    icon:
      selector:
        number:
          min: 0
          max: 100000
      default: 2883
      name: Icon Id
      description: Icon ID
    duration:
      selector:
        number:
          min: 1
          max: 180
          step: 1
      default: 15
    repeat:
      selector:
        number:
          min: 1
          max: 10
          step: 1
      default: 2
    overlay:
      selector:
        text: null
      name: Overlayeffekt
      description: Overlayeffekt der Benachrichtigung
    progress:
      selector:
        number:
          min: -1
          max: 100
          step: 1
      default: -1
    device_prefix:
      name: DevicePrefix
      description: MQTT Prefix der Awtrix
      required: false
      default: "awtrix_50ccb4"
      selector:
        text: {}
  sequence:
    - alias: AssignDefaultVariables
      variables:
        icon: "{{ icon | default(2883) | int }}"
        repeat: "{{ repeat | default(2) | int }}"
        progress: "{{ progress | default(-1) | int }}"
        duration: "{{ duration | default(15) | int }}"
    - alias: PublishMqttPayload
      action: mqtt.publish
      data:
        topic: "{{ device_prefix }}/custom/{{ app_id }}"
        payload: >-
          {% set payload_data = {
            "text": text | default(''),
            "duration": duration,
            "rainbow": false,
            "icon": icon,
            "repeat": repeat,
            "progress": progress
          } %}
          {% if overlay is defined and overlay %}
            {% set payload_data = dict(payload_data, overlay=overlay) %}
          {% endif %}
          {{ payload_data | to_json }}
