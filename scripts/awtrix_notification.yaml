---
# AWTRIX 3 Notifications
awtrix3notif:
  fields:
    text:
      selector:
        text: null
      name: Text
      description: Text Benachrichtigung
    icon:
      selector:
        number:
          min: 0
          max: 100000
      default: 2883
      name: Icon Id
      description: Icon ID
    duration:
      selector:
        number:
          min: 1
          max: 180
          step: 1
      default: 10
    repeat:
      selector:
        number:
          min: 1
          max: 10
          step: 1
      default: 1
    overlay:
      selector:
        text: null
      name: Overlayeffekt
      description: Overlayeffekt der Benachrichtigung
    device_prefix:
      name: DevicePrefix
      description: MQTT Prefix der Awtrix
      required: false
      default: "awtrix_50ccb4"
      selector:
        text: null
  sequence:
    - variables:
        device_prefix: "{{ device_prefix | default('awtrix_50ccb4') }}"
    - action: mqtt.publish
      metadata: {}
      data:
        topic: "{{ device_prefix }}/notify"
        payload: |-
          {
            "text": "{{ text }}",
            "duration": "{{ duration }}",
            "rainbow": "false",
            "icon": "{{ icon }}",
            "repeat": "{{ repeat }}",
            "overlay" : "{{ overlay }}"
          }
  alias: awtrix3Notify
  description: ""
  mode: queued
  max: 10
