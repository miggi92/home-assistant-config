---
# AWTRIX 3 Delete App Notif
awtrix3switch2app:
  fields:
    app_id:
      selector:
        text: null
      name: AppId
      description: App zu der gewechselt werden soll
      required: true
    device_prefix:
      name: DevicePrefix
      description: MQTT Prefix der Awtrix
      required: false
      default: "awtrix_50ccb4"
      selector:
        text: null
  sequence:
    - action: mqtt.publish
      metadata: {}
      data:
        topic: "{{ device_prefix }}/switch"
        payload: |-
          {
            "name": "{{ app_id }}"
          }
  alias: awtrix3Switch2App
  description: ""
