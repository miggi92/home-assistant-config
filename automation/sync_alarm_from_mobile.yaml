---
# Sync alarm
alias: SyncAlarmFromMobile
id: d51b6739-a9df-405d-9a8a-903c8082c0eb
description: Sync Wecker
trigger:
  - platform: state
    entity_id: sensor.pixel_9_pro_next_alarm
    id: miguel
  - platform: state
    entity_id: sensor.pixel_10_pro_next_alarm
    id: silke
condition:
  - alias: "Prüfen ob der Status nicht 'unavailable' oder 'unknown' ist"
    condition: template
    value_template: "{{ states(trigger.entity_id) not in ['unavailable', 'unknown'] }}"
action:
  - alias: "Setze die entsprechende input_datetime"
    service: input_datetime.set_datetime
    target:
      entity_id: "input_datetime.{{ trigger.id }}_wecker"
    data:
      timestamp: "{{ state_attr(trigger.entity_id, 'Time in Milliseconds') | int / 1000 }}"
mode: parallel
max: 10
