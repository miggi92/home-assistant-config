---
# Update Open UV
# https://www.home-assistant.io/integrations/openuv#examples-of-updating-data
alias: "Update OpenUV"
id: 87359f23-5ecb-4cbf-ad00-18fa89fcf969
triggers:
  - trigger: time_pattern
    minutes: "/15"
conditions:
  - condition: sun
    after: sunrise
    before: sunset
    before_offset: "+00:45:00"
  - condition: template
    value_template: >-
      {{
        state_attr('automation.update_openuv', 'last_triggered') == None
        or (
          now() - state_attr('automation.update_openuv', 'last_triggered')
        ) >= timedelta(hours = 0, minutes = 40)
      }}
actions:
  - action: homeassistant.update_entity
    target:
      entity_id:
        - binary_sensor.openuv_schutzfenster
        - sensor.openuv_aktueller_uv_index
