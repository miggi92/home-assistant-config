---
# weather ai img
alias: Weather image
description: ""
id: 665e5eb0-932c-4a69-8dc6-99875649df6c
triggers:
  - trigger: state
    entity_id: weather.home
conditions: []
actions:
  - action: ai_task.generate_image
    data:
      task_name: "Wetterbild"
      instructions: >-
        A photorealistic landscape photography of the town Leingarten, Germany.
        The current season is {{ states('sensor.season') }}.
        The weather condition is {{ states('weather.home') | replace('_', ' ') | replace('-', ' ') }}.
        It is currently {% if is_state('sun.sun', 'above_horizon') %}daytime{% else %}nighttime{% endif %} at {{ as_timestamp(states('sensor.date_time_iso')) | timestamp_custom('%H:%M') }}.
        {% if is_state('sun.sun', 'below_horizon') %}The night sky shows a {{ states('sensor.moon') | replace('_', ' ') }} moon.{% endif %}
        Cinematic lighting, high resolution, highly detailed.
    response_variable: generated_image
  - alias: Send out a manual event to update the image entity
    event: new_weather_image
    event_data:
      url: "{{ generated_image.url }}"
mode: single
