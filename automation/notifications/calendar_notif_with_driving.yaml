---
# Terminerinnerung mit Fahrzeit
alias: Terminerinnerung mit Fahrzeit
id: ccbc1585-d243-44f4-bdf0-ede4445fefb5
trigger:
  - trigger: calendar
    entity_id: calendar.familie
    event: start
    offset: "-00:30:00"
condition:
  - alias: "Überprüfe ob ein Ort angegeben ist"
    condition: template
    value_template: "{{ trigger.calendar_event.location != '' }}"
action:
  - alias: "Setze Startzeit Variable"
    variables:
      start_time: >-
        {{ as_timestamp(trigger.calendar_event.start_time, now().timestamp()) | timestamp_custom('%H:%M', True) }}
  - alias: "Sende Benachrichtigung"
    service: script.notify_engine
    data:
      title: |
        🗓️ Terminerinnerung - {{ trigger.calendar_event.summary }} 🗓️
      value1: >-
        Du hast einen Termin um {{ start_time }} Uhr
          🗺️ Ort: {{ trigger.calendar_event.location }}.
      who: "home"
      tag_id: "information"
      group: "Calendar"
