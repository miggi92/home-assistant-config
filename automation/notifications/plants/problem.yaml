---
# Plant got a problem.
# Currently not in automation: DLI: {{ state_attr(trigger.entity_id, 'dli_status') }}
alias: Pflanzenbenachrichtigung
id: 20f39a8b-975b-4406-99c2-91833f03dbfc
description: "Benachrichtigt wenn eine Pflanze ein problem hat oder wieder in ordnung ist"
trigger:
  - platform: state
    entity_id:
      - plant.blaubeere
      - plant.blaubeerbaum
      - plant.olive_alt
      - plant.erdbeere_mitte
    to:
      - ok
    from:
      - problem
  - platform: state
    entity_id:
      - plant.blaubeere
      - plant.blaubeerbaum
      - plant.olive_alt
      - plant.erdbeere_mitte
    to:
      - problem
    from:
      - ok
condition:
  - condition: state
    entity_id: input_boolean.holiday_mode
    state: "off"
action:
  - action: ai_task.generate_data
    data:
      entity_id: ai_task.google_ai_task
      task_name: plant state
      instructions: |
        You are a smart home gardening assistant. Your task is to write a short push notification in German about a plant's status.

        Rules:
        1. Output format: Strictly German, maximum 2 sentences. Absolutely no markdown, no headers, and no bold text.
        2. Tone: Extremely simple and family-friendly. Translate technical issues into everyday practical needs (e.g., 'braucht mehr Licht', 'Raumklima ist zu trocken', 'benötigt Dünger'). Never use technical terms or abbreviations like 'DLI', 'VPD', 'Conductivity', or 'Illuminance'.
        3. Logic:
          - Ignore any sensors with status 'ok' or 'null'.
          - If all sensors in <sensor_data> are 'ok' or 'null', write a short, friendly message that the plant has recovered and is doing perfectly well.
          - For any 'Low' or 'High' sensor, provide a short, actionable recommendation based on the <care_data> (e.g., 'Die Pflanze braucht Wasser', 'Bitte etwas düngen').

        Plant Name: {{ state_attr(trigger.entity_id, 'friendly_name') | default('Deine Pflanze') }}
        Plant species: {{ state_attr(trigger.entity_id, 'species') | default('Unknown') }}

        <sensor_data>
        Moisture: {{ state_attr(trigger.entity_id, 'moisture_status') }}
        Temperature: {{ state_attr(trigger.entity_id, 'temperature_status') }}
        Conductivity: {{ state_attr(trigger.entity_id, 'conductivity_status') }}
        Illuminance: {{ state_attr(trigger.entity_id, 'illuminance_status') }}
        Humidity: {{ state_attr(trigger.entity_id, 'humidity_status') }}
        CO2: {{ state_attr(trigger.entity_id, 'co2_status') }}
        Soil temperature: {{ state_attr(trigger.entity_id, 'soil_temperature_status') }}
        VPD: {{ state_attr(trigger.entity_id, 'vpd_status') }}
        </sensor_data>

        <care_data>
        Fertilization: {{ state_attr(trigger.entity_id, 'care_fertilization') }}
        Pruning: {{ state_attr(trigger.entity_id, 'care_pruning') }}
        Soil: {{ state_attr(trigger.entity_id, 'care_soil') }}
        Sunlight: {{ state_attr(trigger.entity_id, 'care_sunlight') }}
        Watering: {{ state_attr(trigger.entity_id, 'care_watering') }}
        </care_data>

    response_variable: response
  - action: script.notify_engine
    data:
      title: |
        🪴 Pflanze - {{ trigger.to_state.attributes.friendly_name }} 🪴
      value1: |
        {{ response.data }}
        Standort: {{ area_name(trigger.entity_id) | default('Zuhause', true) }}
      who: "home"
      tag_id: "information"
      group: "Pflanzen"
mode: parallel
