---
# Room analysis
alias: Climate analysis
id: 7954ce4c-46ba-4224-8f18-e1b470550b92
description: ""
triggers:
  - trigger: time_pattern
    minutes: /30
    alias: Trigger every 30 minutes
conditions:
  - condition: state
    entity_id: group.residents
    state: "home"
    alias: Check if residents are home
actions:
  - action: ai_task.generate_data
    alias: Generate climate analysis via AI
    data:
      entity_id: ai_task.google_ai_task
      task_name: climate_analysis
      instructions: |
        ROLE:
        You are an expert for indoor climate and HVAC systems. Analyze the provided data and generate a summary in German.

        INPUT DATA AND PRE-CALCULATED LOGIC:
        - Outdoors:
            Temp: {{ states('sensor.temperatur') | float(-99) }} °C
            Humidity: {{ states('sensor.luftfeuchtigkeit') | float(-1) }} %
            Dew Point: {{ states('sensor.aussen_thermal_comfort_taupunkt') | float(-99) }} °C
        - Home_Global:
            Temp: {{ states('sensor.wohnungstemperatur') | float(-99) }} °C
            Humidity: {{ states('sensor.wohnungsfeuchtigkeit') | float(-1) }} %
            Is_Hotter_Outside: {{ 'true' if states('sensor.temperatur') | float(-99) > states('sensor.wohnungstemperatur') | float(-99) else 'false' }}
        - Office:
            Temp: {{ states('sensor.burotemperatur') | float(-99) }} °C
            Humidity: {{ states('sensor.buroluftfeuchtigkeit') | float(-1) }} %
            VOC: {{ states('sensor.buroluftqualitatssensor_voc_index') | int(-1) }}
            PM25: {{ states('sensor.buroluftqualitatssensor_pm25') | float(-1) }} µg/m³
            Air_Quality_Warning: {{ 'true' if states('sensor.buroluftqualitatssensor_voc_index') | int(-1) > 250 or states('sensor.buroluftqualitatssensor_pm25') | float(-1) > 20 else 'false' }}
        - Living_Room:
            Temp: {{ states('sensor.wohnzimmertemperatur') | float(-99) }} °C
            Humidity: {{ states('sensor.wohnzimmerluftfeuchtigkeit') | float(-1) }} %
            Dew Point: {{ states('sensor.wohnzimmer_thermal_comfort_taupunkt') | float(-99) }} °C
            Dehumidify_Favorable: {{ 'true' if states('sensor.aussen_thermal_comfort_taupunkt') | float(-99) < states('sensor.wohnzimmer_thermal_comfort_taupunkt') | float(-99) else 'false' }}
        - Bedroom:
            Temp: {{ states('sensor.schlafzimmertemperatur') | float(-99) }} °C
            Humidity: {{ states('sensor.schlafzimmerluftfeuchtigkeit') | float(-1) }} %
            Dew Point: {{ states('sensor.schlafzimmer_thermal_comfort_taupunkt') | float(-99) }} °C
            Dehumidify_Favorable: {{ 'true' if states('sensor.aussen_thermal_comfort_taupunkt') | float(-99) < states('sensor.schlafzimmer_thermal_comfort_taupunkt') | float(-99) else 'false' }}

        STRICT LOGIC RULES:
        1. Heat Protection: If 'Is_Hotter_Outside' is true, NEVER advise opening windows for cooling. Explicitly advise keeping windows closed to prevent heat entering, unless 'Air_Quality_Warning' is true.
        2. Humidity: Only recommend ventilation for humidity if 'Dehumidify_Favorable' is true AND 'Is_Hotter_Outside' is false.
        3. Air Quality Priority: If 'Air_Quality_Warning' is true, recommend brief ventilation, but warn about incoming heat if 'Is_Hotter_Outside' is true.

        OUTPUT INSTRUCTIONS:
        - Language: German
        - Tone: Professional, ultra-concise, helpful.
        - Constraint: MAXIMUM 150 characters per room response.
        - Format: Combine state, reasoning, and recommendation into max 2 sentences.
        - Missing Data: If values are -99 or -1, state "Daten nicht verfügbar".

      structure:
        house:
          description: "Summary for the whole house"
          required: true
          selector:
            text:
        office:
          description: "Analysis for the office"
          required: true
          selector:
            text:
        living:
          description: "Analysis for the living room"
          required: true
          selector:
            text:
        sleep:
          description: "Analysis for the bedroom"
          required: true
          selector:
            text:
    response_variable: response
  - parallel:
      - action: input_text.set_value
        alias: Update house analysis
        target:
          entity_id: input_text.klima_analyse
        data:
          value: "{{ response.data.house }}"
      - action: input_text.set_value
        alias: Update office analysis
        target:
          entity_id: input_text.arbeitszimmer_klima_analyse
        data:
          value: "{{ response.data.office }}"
      - action: input_text.set_value
        alias: Update living room analysis
        target:
          entity_id: input_text.wohnzimmer_klima_analyse
        data:
          value: "{{ response.data.living }}"
      - action: input_text.set_value
        alias: Update bedroom analysis
        target:
          entity_id: input_text.schlafzimmer_klima_analyse
        data:
          value: "{{ response.data.sleep }}"
    alias: Save analysis to input texts
mode: single
