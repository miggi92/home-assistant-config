---
# work meal ai img
alias: MealImg
description: ""
id: ffe67e29-366b-4661-a0b0-bfea95d4468e
triggers:
  - trigger: text.changed
    target:
      label_id: essen
    alias: Listen to all entities with the Meal label
conditions:
  - condition: template
    value_template: >
      {{ states(trigger.entity_id) not in ['unavailable', 'unknown', ''] }}
actions:
  - variables:
      directory: >
        {% set eid = trigger.entity_id %}
        {% if 'work' in eid %}
          work_meals
        {% elif 'kita' in eid %}
          kita_meals
        {% else %}
          meals
        {% endif %}
      clean_name: "{{ trigger.entity_id.split('.')[1] }}"
      gerichte_liste: >-
        {% set raw = trigger.to_state.state %}
        {% if '•' in raw %}
          {{ raw.split('•') | map('trim') | select('ne','') | list }}
        {% else %}
          {{ raw.split(' oder ') | map('trim') | select('ne','') | list }}
        {% endif %}
      anzahl: "{{ gerichte_liste | count }}"
      plating_instruction: >-
        {% if anzahl | int > 1 %}
          The image shows {{ anzahl }} separate dishes, each on its own plate,
          arranged side by side on the same table:
          {% for g in gerichte_liste %}
          Plate {{ loop.index }}: {{ g }}.
          {% endfor %}
          Each plate is clearly distinct and fully visible.
        {% else %}
          The dish is appetizingly plated on a single appropriate plate:
          {{ gerichte_liste | first }}.
        {% endif %}
  - action: ai_task.generate_image
    data:
      task_name: "Meal {{ clean_name }}"
      instructions: |-
        Professional, high-resolution food photography.
        {{ plating_instruction }}
        Set on a stylish dining table with modern food styling aesthetics.
        Natural, warm side lighting highlights the textures, gloss, and freshness of the ingredients.
        Subtly garnished with appropriate fresh herbs, spices, or sides to add color contrast.
        Razor-sharp focus on the dishes in the foreground, with a soft bokeh background suggesting a cozy restaurant or home setting.
        No text, no words, no watermarks.
    response_variable: meal

  - action: downloader.download_file
    data:
      overwrite: true
      url: "http://localhost:8123{{ meal.url }}"
      filename: "{{ clean_name }}.png"
      subdir: "{{ directory }}"
  - action: input_text.set_value
    target:
      entity_id: input_text.meal_image_cache_buster
    data:
      value: "{{ as_timestamp(now()) }}"
mode: parallel
