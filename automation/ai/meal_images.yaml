---
# work meal ai img
alias: MealImg
description: ""
id: ffe67e29-366b-4661-a0b0-bfea95d4468e
triggers:
  - trigger: text.changed
    target:
      label_id: essen
    alias: Listen to all entities with the Meal label
conditions:
  - condition: template
    value_template: >
      {{ states(trigger.entity_id) not in ['unavailable', 'unknown', ''] }}
actions:
  - variables:
      directory: >
        {% set eid = trigger.entity_id %}
        {% if 'work' in eid %}
          work_meals
        {% elif 'kita' in eid %}
          kita_meals
        {% else %}
          meals
        {% endif %}
      clean_name: "{{ trigger.entity_id.split('.')[1] }}"
  - action: ai_task.generate_image
    data:
      task_name: "Meal {{ clean_name }}"
      instructions: |-
        Professional, high-resolution food photography of: {{ trigger.to_state.state }}.
        The dish is appetizingly plated on appropriate tableware and set on a stylish dining table.
        Modern food styling aesthetics.
        Natural, warm side lighting highlights the textures, gloss, and freshness of the ingredients.
        Subtly garnished with appropriate fresh herbs, spices, or sides to add color contrast.
        Razor-sharp focus on the dish in the foreground, with a soft bokeh background suggesting a cozy restaurant or home setting.
        No text, no words, no watermarks.
    response_variable: meal

  - action: downloader.download_file
    data:
      overwrite: true
      url: "http://localhost:8123{{ meal.url }}"
      filename: "{{ clean_name }}.png"
      subdir: "{{ directory }}"
  - action: input_text.set_value
    target:
      entity_id: input_text.meal_image_cache_buster
    data:
      value: "{{ as_timestamp(now()) }}"
mode: parallel
