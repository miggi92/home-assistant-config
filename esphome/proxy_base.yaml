---
# BT Proxy Base
esphome:
  name: ${node_name}
  name_add_mac_suffix: false
  friendly_name: ${node_friendly_name}

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true

api:
  encryption:
    key: !secret proxy_encryption

web_server:
  port: 80
  version: 3
  
logger:
  level: INFO

improv_serial:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: !secret home_domain
  fast_connect: true
  power_save_mode: none
  manual_ip:
    static_ip: ${ip_address}
    gateway: !secret wifi_gateway
    subnet: !secret wifi_subnet
  ap:
    password: !secret wifi_fallback_password

captive_portal:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${node_friendly_name} IP Address"
    mac_address:
      name: "${node_friendly_name} MAC Address"

  - platform: version
    name: "${node_friendly_name} ESPHome Version"

sensor:
  - platform: uptime
    name: "${node_friendly_name} Uptime"

  - platform: wifi_signal
    name: "${node_friendly_name} WiFi Signal"
    update_interval: 60s

button:
  - platform: restart
    name: "${node_friendly_name} Restart"

ota:
  - platform: esphome
    password: !secret proxy_base_ota_password