---
# BT Proxy Base
packages:
  esphome.bluetooth-proxy: github://esphome/firmware/bluetooth-proxy/m5stack-atom-lite.yaml@main

esphome:
  name: ${node_name}
  name_add_mac_suffix: false
  friendly_name: ${node_friendly_name}

api:
  encryption:
    key: !secret proxy_encryption

web_server:
  port: 80

improv_serial:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: !secret home_domain
  manual_ip:
    static_ip: ${ip_address}
    gateway: !secret wifi_gateway
    subnet: !secret wifi_subnet
  ap:
    password: !secret wifi_fallback_password

captive_portal:

sensor:
  - platform: uptime
    name: "${node_friendly_name} Uptime"

  - platform: wifi_signal
    name: "${node_friendly_name} WiFi Signal"
    update_interval: 60s

button:
  - platform: restart
    name: "${node_friendly_name} Restart"

ota:
