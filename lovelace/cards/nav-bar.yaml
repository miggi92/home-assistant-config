---
# navbar
type: custom:navbar-card
routes:
  - url: start
    icon_selected: mdi:home
    icon: mdi:home-outline
    label: Startseite
  - icon: mdi:home-floor-negative-1
    label: "UG"
    tap_action: { action: open-popup }
    popup: |
      [[[
        return Object.values(hass.areas)
          .filter(area => area.floor_id === 'keller')
          .map(area => {
            const lightCountEntityId = 'number.count_lights_' + area.area_id;

            const lightCountState = states[lightCountEntityId];
            let badgeCount = 0;
            let showBadge = false;

            if (lightCountState && lightCountState.state > 0) {
              badgeCount = Math.ceil(lightCountState.state);
              showBadge = true;
            }

            return {
              label: area.name,
              url: "room-ug-" + area.area_id,
              icon: area.icon,
              badge: {
                show: showBadge,
                count: badgeCount
              }
            }
          });
      ]]]
    selected: |
      [[[
        const path = window.location.pathname;
        return path.startsWith('room-ug-');
      ]]]
    badge:
      show: |
        [[[ return states['number.count_lights_ug'].state > 0; ]]]
      count: |
        [[[  return Math.ceil(states['number.count_lights_ug'].state); ]]]
  - icon: mdi:home-floor-g
    label: "EG"
    tap_action: { action: open-popup }
    popup: |
      [[[
        return Object.values(hass.areas)
          .filter(area => area.floor_id === 'eg')
          .map(area => {
            const lightCountEntityId = 'number.count_lights_' + area.area_id;

            const lightCountState = states[lightCountEntityId];
            let badgeCount = 0;
            let showBadge = false;

            if (lightCountState && lightCountState.state > 0) {
              badgeCount = Math.ceil(lightCountState.state);
              showBadge = true;
            }

            return {
              label: area.name,
              url: "room-eg-" + area.area_id,
              icon: area.icon,
              badge: {
                show: showBadge,
                count: badgeCount
              }
            }
          });
      ]]]
    selected: |
      [[[
        const path = window.location.pathname;
        return path.startsWith('room-eg-');
      ]]]
    badge:
      show: |
        [[[ return states['number.count_lights_eg'].state > 0; ]]]
      count: |
        [[[  return Math.ceil(states['number.count_lights_eg'].state); ]]]
  - icon: mdi:home-floor-1
    label: "1. OG"
    tap_action: { action: open-popup }
    popup: |
      [[[
        return Object.values(hass.areas)
          .filter(area => area.floor_id === '1_og')
          .map(area => {
            const lightCountEntityId = 'number.count_lights_' + area.area_id;

            const lightCountState = states[lightCountEntityId];
            let badgeCount = 0;
            let showBadge = false;

            if (lightCountState && lightCountState.state > 0) {
              badgeCount = Math.ceil(lightCountState.state);
              showBadge = true;
            }

            return {
              label: area.name,
              url: "room-1og-" + area.area_id,
              icon: area.icon,
              badge: {
                show: showBadge,
                count: badgeCount
              }
            }
          });
      ]]]
    selected: |
      [[[
        const path = window.location.pathname;
        return path.startsWith('room-1og-');
      ]]]
    badge:
      show: |
        [[[ return states['number.count_lights_1_og'].state > 0; ]]]
      count: |
        [[[  return Math.ceil(states['number.count_lights_1_og'].state); ]]]
  - url: cams
    icon: mdi:cctv
    label: Kameras
    hidden: |
      [[[
        return window.innerWidth <= 768;
      ]]]
  - icon: mdi:devices
    tap_action: { action: open-popup }
    label: Details
    popup:
      - icon: mdi:crane
        url: details-bau
        label: Hausbau
      - icon: mdi:weather-partly-snowy-rainy
        url: details-weather
        label: Wetter
    selected: |
      [[[
        const path = window.location.pathname;
        return path.startsWith('details-');
      ]]]
    hidden: |
      [[[
        return window.innerWidth <= 768;
      ]]]
  - icon: mdi:cog
    label: "Profil"
    image: |
      [[[
        return hass.states['person.miguel'].attributes.entity_picture;
      ]]]
    url: miguel
    hidden: |
      [[[ return user.name !== 'Miguel' ]]]
  - icon: mdi:cog
    label: "Profil"
    image: |
      [[[
        return hass.states['person.silke'].attributes.entity_picture;
      ]]]
    url: silke
    hidden: |
      [[[ return user.name !== 'Silke' ]]]
  - icon: mdi:cog
    label: "Profil"
    image: |
      [[[
        return hass.states['image.tablet_picture'].attributes.entity_picture;
      ]]]
    url: tablet
    hidden: |
      [[[ return user.name !== 'Tablet' ]]]
  - icon: mdi:dots-horizontal
    label: Mehr
    tap_action:
      action: open-popup
    popup:
      - icon: mdi:account
        label: Profil
        url: /profile/general
      - icon: mdi:cog
        label: Einstellungen
        url: /config/dashboard
        hidden: |
          [[[ return user.name != 'Miguel' ]]]
      - icon: mdi:hammer
        label: Entwickler
        url: /developer-tools/yaml
        hidden: |
          [[[ return user.name != 'Miguel' ]]]
      - icon: mdi:power
        label: Neustart HA
        hidden: |
          [[[ return user.name != 'Miguel' ]]]
        tap_action:
          action: call-service
          service: homeassistant.restart
          service_data: {}
          confirmation:
            text: Are you sure you want to restart Home Assistant?
desktop:
  position: left
  show_labels: true
  min_width: 768
mobile:
  show_labels: true
media_player:
  players:
    - entity: media_player.miguel_s_ford_sync
    - entity: media_player.spotify_miguel
    - entity: media_player.wohnzimmer_tv
    - entity: media_player.toniebox_milo
  album_cover_background: true
layout:
  auto-padding:
    enabled: true
styles: |
  .image {
    border-radius: 16px !important;
  }
