---
title: Wetter
path: details-weather
icon: mdi:weather-partly-snowy-rainy
subview: true
type: sections
max_columns: 3
badges:
  - type: entity
    entity: sensor.kohgeb_family_home_lightning_counter
  - type: custom:mushroom-template-badge
    icon: mdi:cloud-alert
    color: >
      {% if states(entity) == "0" %}
      grey
      {% else %}
      red
      {% endif %}
    entity: sensor.home_aktuelle_warnstufe
    label: DWD
    content: >
      {% if states(entity) == "0" %}
      Keine Warnungen
      {% else %}
      Warnungen: {{states(entity)}}
      {% endif %}
    tap_action:
      action: navigate
      navigation_path: dwd
  - type: entity
    entity: sensor.aussen_home_kleidungsempfehlung
sections:
  - type: grid
    cards:
      - !include ../../../cards/nav-bar.yaml
      - type: weather-forecast
        show_current: true
        show_forecast: true
        entity: weather.home
        forecast_type: daily
        forecast_slots: 5
      - type: weather-forecast
        show_current: false
        show_forecast: true
        entity: weather.home
        forecast_type: hourly
        forecast_slots: 5
      - type: custom:mushroom-template-card
        primary: "UV Index: {{ states('sensor.openuv_aktueller_uv_index') | float(0) | round(1) }}"
        secondary: >
          {% set uv = states('sensor.openuv_aktueller_uv_index') | float(0) %}
          {% if uv < 3 %}
          🟢 Niedrig - Kein Schutz notwendig
          {% elif uv < 6 %}
          🟡 Mittel - Bleib im Schatten, benutze LSF 30
          {% elif uv < 8 %}
          🟠 Hoch - LSF 30+, zieh Hut und Sonnenbrille an
          {% elif uv < 11 %}
          🔴 Sehr hoch - LSF 50+, Schutzkleidung
          {% else %}
          🟣 Extrem - Vermeide die Sonne, LSF 50+
          {% endif %}

          Zeit ohne Schutz zwischen {{ states('sensor.openuv_hauttyp_1_eigenschutzzeit') }} und {{ states('sensor.openuv_hauttyp_3_eigenschutzzeit') }} min
        icon: mdi:white-balance-sunny
        multiline_secondary: true
        layout: vertical
        color: >
          {% set uv = states('sensor.openuv_aktueller_uv_index') | float(0) %} {% if uv
          < 3 %} green {% elif uv < 6 %} yellow {% elif uv < 8 %} orange {% elif uv < 11
          %} red {% else %} purple {% endif %}
        entity: sensor.openuv_aktueller_uv_index
        grid_options:
          columns: full
          rows: auto

  - type: grid
    cards:
      - type: picture-entity
        entity: camera.wetter_radar_dwd
        show_state: false
        show_name: false
  - type: grid
    cards:
      - type: conditional
        conditions:
          - entity: sensor.kohgeb_family_home_lightning_counter
            state_not: "0"
        card:
          type: vertical-stack
          cards:
            - type: grid
              cards:
                - type: custom:mushroom-entity-card
                  entity: sensor.kohgeb_family_home_lightning_counter
                  name: Blitze
                - type: custom:mushroom-entity-card
                  entity: sensor.kohgeb_family_home_lightning_distance
                  name: Letzer Blitz
            - type: map
              entities: []
              theme_mode: auto
              geo_location_sources:
                - blitzortung
