---
title: Hausbau
path: details-bau
icon: mdi:home
subview: true
type: sections
max_columns: 3
header:
  layout: center
  badges_position: top
badges:
  - type: custom:decluttering-card
    template: percentage_badge_template
    variables:
      - entity: sensor.hausbau_fertigstellung
      - name: "Fertigstellung"
      - icon: mdi:crane
  - type: custom:mushroom-template-badge
    icon: mdi:crane
    entity: sensor.hausbau_aktuelle_phase
    label: "Aktuelle Phase"
    content: "{{states(entity) }}"
    tap_action:
      action: more-info

sections:
  - type: grid
    cards:
      - !include ../../../cards/nav-bar.yaml
      - type: markdown
        title: Build Timeline
        content: |
          {% set datetime_entities = states.input_datetime | selectattr('entity_id', 'search', 'input_datetime.hausbau_') | sort(attribute='state') | list %}
          {% set counts = namespace(completed=0) %}
          {% set total_entities = datetime_entities | length %}

          | Date | Milestone | Status | Timeline |
          | :--- | :--- | :--- | :--- |
          {%- for entity in datetime_entities %}
          {%- set phase_name = entity.attributes.friendly_name | replace('Hausbau ', '') %}
          {%- set date_val = entity.state %}
          {%- set boolean_id = entity.entity_id | replace('input_datetime.', 'input_boolean.') %}
          {%- set is_done = is_state(boolean_id, 'on') %}
          {%- if is_done %}
            {%- set counts.completed = counts.completed + 1 %}
          {%- endif %}
          {%- set is_delayed = false %}
          {%- if date_val not in ['unknown', 'unavailable'] %}
            {%- set dt = (date_val | as_datetime | as_local) %}
            {%- set date_fmt = dt.strftime('%d.%m.%Y') %}
            {%- set days_diff = (dt.date() - now().date()).days %}
            {%- if days_diff > 0 %}
              {%- set time_info = "in " ~ days_diff ~ " Tagen" %}
            {%- elif days_diff == 0 %}
              {%- set time_info = "Heute" %}
            {%- else %}
              {%- set time_info = "vor " ~ (days_diff | abs) ~ " Tagen" %}
            {%- endif %}
            {%- if not is_done and days_diff < 0 %}
              {%- set is_delayed = true %}
            {%- endif %}
          {%- else %}
            {%- set date_fmt = 'TBD' %}
            {%- set time_info = '-' %}
          {%- endif %}

          {%- if is_done %}
            {%- set icon = '✅' %}
            {%- set row_style = '' %}
          {%- elif is_delayed %}
            {%- set icon = '⚠️' %}
            {%- set row_style = 'color: var(--error-color); font-weight: bold;' %}
          {%- else %}
            {%- set icon = '⏳' %}
            {%- set row_style = '' %}
          {%- endif %}
          | <span style="{{ row_style }}">{{ date_fmt }}</span> | <span style="{{ row_style }}">{{ phase_name }}</span> | {{ icon }} | <span style="{{ row_style }}">{{ time_info }}</span> |
          {%- endfor %}

          ***

          {% set percent = 0 %}
          {% if total_entities > 0 %}
            {% set percent = (counts.completed / total_entities * 100) | round(0) | int %}
          {% endif %}
          {% set blocks_filled = (percent / 10) | round(0) | int %}
          {% set blocks_empty = 10 - blocks_filled %}

          **Progress:** `[{{ '█' * blocks_filled }}{{ '░' * blocks_empty }}]` {{ percent }}%

  - type: grid
    cards:
      - type: custom:auto-entities
        card:
          type: vertical-stack
        card_param: cards
        filter:
          template: |
            {% set datetime_entities = states.input_datetime | selectattr('entity_id', 'search', 'input_datetime.hausbau_') | sort(attribute='state') | list %}
            {% set ns = namespace(items=[]) %}
            {% for entity in datetime_entities %}
              {% set phase_name = entity.attributes.friendly_name | replace('Hausbau ', '') %}
              {% set boolean_id = entity.entity_id | replace('input_datetime.', 'input_boolean.') %}
              {% set is_done = is_state(boolean_id, 'on') %}
              {% set date_val = entity.state %}
              {% set is_delayed = false %}
              {% set date_fmt = 'TBD' %}
              {% set time_info = '-' %}

              {% if date_val not in ['unknown', 'unavailable'] %}
                {% set dt = (date_val | as_datetime | as_local) %}
                {% set date_fmt = dt.strftime('%d.%m.%Y') %}
                {% set days_diff = (dt.date() - now().date()).days %}
                {% if days_diff > 0 %}
                  {% set time_info = "in " ~ days_diff ~ " Tagen" %}
                {% elif days_diff == 0 %}
                  {% set time_info = "Heute" %}
                {% else %}
                  {% set time_info = "vor " ~ (days_diff | abs) ~ " Tagen" %}
                {% endif %}
                {% if not is_done and days_diff < 0 %}
                  {% set is_delayed = true %}
                {% endif %}
              {% endif %}

              {% set icon_color = 'disabled' %}
              {% if is_done %}
                {% set icon_color = 'green' %}
              {% elif is_delayed %}
                {% set icon_color = 'red' %}
              {% endif %}

              {% set ns.items = ns.items + [{
                "datetime_id": entity.entity_id,
                "boolean_id": boolean_id,
                "phase_name": phase_name,
                "is_done": is_done,
                "icon_color": icon_color,
                "date_fmt": date_fmt,
                "time_info": time_info
              }] %}
            {% endfor %}

            {% set sorted_items = ns.items | sort(attribute='is_done') %}
            [
              {% for item in sorted_items %}
              {
                "type": "custom:mushroom-template-card",
                "primary": "{{ item.phase_name }}",
                "secondary": "{{ item.date_fmt }} ({{ item.time_info }})",
                "icon": "mdi:crane",
                "icon_color": "{{ item.icon_color }}",
                "tap_action": {
                  "action": "more-info",
                  "entity": "{{ item.datetime_id }}"
                },
                "hold_action": {
                  "action": "more-info",
                  "entity": "{{ item.boolean_id }}"
                }
              }{{ "," if not loop.last else "" }}
              {% endfor %}
            ]
  - type: grid
    cards: []
