---
title: Medizin
path: medication
icon: mdi:medication-outline
subview: true
type: sections
max_columns: 3
badges: []
sections:
  - type: grid
    cards:
      - !include ../../../cards/nav-bar.yaml

      # --- Ausstehende Medikamente ---
      - type: custom:auto-entities
        show_empty: false
        card:
          type: entities
          title: "Ausstehende Medikamente"
          show_header_toggle: false
        filter:
          template: >
            {% set result = namespace(items=[]) %}
            {% for medi in states.input_select
                  | selectattr('entity_id', 'match', 'input_select.medis_')
                  | selectattr('state', 'eq', 'ausstehend') %}
              {% set clean_name = medi.attributes.friendly_name
                  | regex_replace('^[Mm]edis[ _]', '') %}
              {% set item = {
                'type': 'custom:multiple-entity-row',
                'entity': medi.entity_id,
                'name': clean_name,
                'show_state': false,
                'entities': [
                  {
                    'icon': 'mdi:check',
                    'name': 'Nehmen',
                    'tap_action': {
                      'action': 'call-service',
                      'service': 'input_select.select_option',
                      'service_data': {
                        'entity_id': medi.entity_id,
                        'option': 'genommen'
                      }
                    }
                  },
                  {
                    'icon': 'mdi:close',
                    'name': 'Skip',
                    'tap_action': {
                      'action': 'call-service',
                      'service': 'input_select.select_option',
                      'service_data': {
                        'entity_id': medi.entity_id,
                        'option': 'übersprungen'
                      }
                    }
                  }
                ]
              } %}
              {% set result.items = result.items + [item] %}
            {% endfor %}
            {{ result.items }}

  # --- Historie ---
  - type: grid
    cards:
      - type: "custom:auto-entities"
        show_empty: false
        card:
          type: entities
          title: "Historie"
          show_header_toggle: false
        filter:
          include:
            - entity_id: input_select.medis_*
              state: "genommen"
              options:
                type: custom:mushroom-entity-card
                secondary_info: last-changed
                icon: mdi:pill
                icon_color: red
                tap_action:
                  action: more-info
            - entity_id: input_select.medis_*
              state: "übersprungen"
              options:
                type: custom:mushroom-entity-card
                secondary_info: last-changed
                icon: mdi:pill-off
                icon_color: grey
                tap_action:
                  action: more-info
          exclude:
            - last_changed: "> 1 d ago"
        sort:
          method: last_changed
          reverse: true
          count: 10

  # --- Vorrat + Einstellungen ---
  - type: grid
    cards:
      - type: markdown
        title: Medikamentenvorrat
        content: |
          | Produkt | Menge | Status |
          | :--- | :--- | :--- |
          {%- set items = state_attr('sensor.grocy_stock', 'products') %}
          {%- if items is none %}
          | _Grocy nicht erreichbar_ | | |
          {%- else %}
          {%- set med_list = items | selectattr('product_group_id', 'eq', 14) | sort(attribute='name') %}
          {%- if med_list | count == 0 %}
          | _Keine Medikamente im Vorrat_ | | |
          {%- else %}
          {%- set agg_names = med_list
                | selectattr('is_aggregated_amount', 'eq', true)
                | map(attribute='name') | map('trim') | list %}
          {%- set now_ts = as_timestamp(now()) %}
          {%- set soon_ts = as_timestamp(now() + timedelta(days=90)) %}
          {%- for item in med_list -%}
            {%- set expire_date = as_timestamp(item.best_before_date) if item.best_before_date else None %}
            {%- set is_expired = expire_date is not none and expire_date < now_ts %}
            {%- set expires_soon = expire_date is not none and expire_date < soon_ts %}
            {%- set status = '➖' if expire_date is none else ('❌' if is_expired else ('⚠️' if expires_soon else '✅')) %}

            {%- if item.is_aggregated_amount == true %}
          | **{{ item.name | trim }}** | {{ item.amount_aggregated | int(0) }} | {{ status }} |
            {%- elif item.name | trim not in agg_names %}
          | {{ item.name | trim }} | {{ item.available_amount | int(0) }} | {{ status }} |
            {%- endif -%}
          {%- endfor %}
          {%- endif %}
          {%- endif %}

      # Erinnerungszeiten kompakt nebeneinander
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: input_datetime.medis_reminder_time_morning
            layout: vertical
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: input_datetime.medis_reminder_time_evening
            layout: vertical
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: input_datetime.medis_reminder_time_night
            layout: vertical
            tap_action:
              action: more-info

      # Benachrichtigungs-Toggles kompakt nebeneinander
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: input_boolean.medi_notification_silke
            name: Silke
            layout: vertical
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: input_boolean.medi_notification_miguel
            name: Miguel
            layout: vertical
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: input_boolean.medi_notification_milo
            name: Milo
            layout: vertical
            tap_action:
              action: more-info
