---
title: Außen
path: room-eg-aussen
icon: mdi:tree
subview: true
type: sections
max_columns: 3
header:
  layout: center
  badges_position: top
  card:
    type: markdown
    text_only: true
    content: |-
      {{ states('input_text.aussen_klima_analyse' ) }}
badges:
  - type: entity
    entity: sun.sun
  - type: custom:mushroom-template-badge
    content: >-
      Aufgang  {% if states.sun.sun %} {{
      (as_timestamp(states.sun.sun.attributes.next_rising)) |
      timestamp_custom(('%H:%M') )}} {% endif %}
    icon: mdi:weather-sunset-up
  - type: custom:mushroom-template-badge
    content: >-
      Untergang  {% if states.sun.sun %} {{
      (as_timestamp(states.sun.sun.attributes.next_setting)) |
      timestamp_custom(('%H:%M') )}} {% endif %}
    icon: mdi:weather-sunset-down
  - type: entity
    entity: sensor.moon
  - type: entity
    entity: sensor.zodiac
sections:
  - type: grid
    cards:
      - !include ../../../../cards/nav-bar.yaml
      - type: weather-forecast
        entity: weather.home
        secondary_info_attribute: humidity
        show_current: true
        show_forecast: true
      - type: picture
        image_entity: image.ai_generated_weather_image
  - type: grid
    cards:
      - type: vertical-stack
        cards:
          - type: grid
            cards:
              - type: custom:decluttering-card
                template: waste_card_template
                variables:
                  - entity: sensor.restmull
                  - title: Restmüll
                  - max_days: 15
              - type: custom:decluttering-card
                template: waste_card_template
                variables:
                  - entity: sensor.papier
                  - title: Papiertonne
                  - icon_color: blue
              - type: custom:decluttering-card
                template: waste_card_template
                variables:
                  - entity: sensor.gelbe_tonne
                  - title: Gelbe Tonne
                  - icon_color: yellow
                  - max_days: 15
              - type: custom:decluttering-card
                template: waste_card_template
                variables:
                  - entity: sensor.schadstoffe
                  - title: Schadstoffe
                  - icon_color: orange
                  - max_days: 80
              - type: custom:decluttering-card
                template: waste_card_template
                variables:
                  - entity: sensor.bio
                  - title: Biotonne
                  - icon_color: brown
                  - max_days: 15
      - type: custom:decluttering-card
        template: pollen_card_template
  - type: grid
    cards:
      - type: picture-entity
        entity: camera.rathaus
        show_state: false
        camera_image: camera.rathaus
      - type: picture-entity
        entity: camera.schleuse_oberwasser
        show_state: false
        camera_image: camera.schleuse_oberwasser
      - type: picture-entity
        entity: camera.schleuse_unterwasser
        show_state: false
        camera_image: camera.schleuse_unterwasser
