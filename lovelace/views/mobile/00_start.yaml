---
title: Home
path: start
icon: mdi:home
type: sections
max_columns: 3
header:
  layout: center
  badges_position: top
  card:
    type: markdown
    text_only: true
    content: |-
      # Hallo {{ user }}
      {% if states('binary_sensor.morgen') == 'on' %}
      {{ states('input_text.ai_morning_briefing') }}
      {% endif %}
      {{ states('input_text.klima_analyse') }}
badges:
  - type: custom:mushroom-template-badge
    entity: alarm_control_panel.alarmo
    icon: |-
      {% set mode = states(entity) %}
      {% set icons = {
        'armed_home': 'mdi:shield-account',
        'armed_away': 'mdi:shield-lock',
        'armed_vacation': 'mdi:palm-tree',
        'armed_night': 'mdi:shield-moon',
        'arming': 'mdi:shield'
      } %}
      {{ icons.get(mode, 'mdi:shield-off') }}
    tap_action:
      action: more-info
  - type: custom:mushroom-template-badge
    entity: weather.home
    icon: >-
      mdi:weather-{{ states(entity)
        | replace('partlycloudy', 'partly-cloudy')
        | replace('clear-night', 'night') }}
    label: "{{ state_attr(entity, 'friendly_name') }}"
    content: "{{ state_attr(entity, 'temperature') }} {{ state_attr(entity, 'temperature_unit') }}"
    tap_action:
      action: more-info
  - type: custom:mushroom-template-badge
    icon: mdi:message-badge-outline
    tap_action:
      action: navigate
      navigation_path: notification
  - type: custom:mushroom-template-badge
    entity: switch.dnd
    content: "DnD"
    icon: "{{ 'mdi:minus-circle' if is_state(entity, 'on') else 'mdi:minus-circle-off' }}"
    tap_action:
      action: more-info
  - type: custom:mushroom-template-badge
    entity: number.anzahl_der_ausstehenden_medikamente
    icon: mdi:medication
    color: "{{ 'red' if states(entity) | int(0) > 0 else 'grey' }}"
    tap_action:
      action: navigate
      navigation_path: medication
  - type: custom:mushroom-template-badge
    icon: mdi:lightbulb
    color: "{{ 'yellow' if states(entity) | int(0) > 0 else 'grey' }}"
    entity: number.count_lights_on
    tap_action:
      action: navigate
      navigation_path: lights
  - type: custom:decluttering-card
    template: temperature_badge_template
    variables:
      - entity: sensor.wohnungstemperatur
  - type: custom:decluttering-card
    template: humidity_badge_template
    variables:
      - entity: sensor.wohnungsfeuchtigkeit
  - type: custom:decluttering-card
    template: motion_badge_template
    variables:
      - entity: binary_sensor.bewegungssensoren
  - type: custom:decluttering-card
    template: waste_badge_template
    variables:
      - entity: sensor.restmull
    visibility:
      - condition: state
        entity: sensor.restmull
        state: ["Restabfall in 2 days", "Restabfall in 1 days", "Restabfall in 0 days"]
  - type: custom:decluttering-card
    template: waste_badge_template
    variables:
      - entity: sensor.papier
    visibility:
      - condition: state
        entity: sensor.papier
        state:
          ["Papiertonne in 2 days", "Papiertonne in 1 days", "Papiertonne in 0 days"]
  - type: custom:decluttering-card
    template: waste_badge_template
    variables:
      - entity: sensor.gelbe_tonne
    visibility:
      - condition: state
        entity: sensor.gelbe_tonne
        state:
          ["Gelbe Tonne in 2 days", "Gelbe Tonne in 1 days", "Gelbe Tonne in 0 days"]
  - type: custom:decluttering-card
    template: waste_badge_template
    variables:
      - entity: sensor.bio
    visibility:
      - condition: state
        entity: sensor.bio
        state: ["Bioabfall in 2 days", "Bioabfall in 1 days", "Bioabfall in 0 days"]
  - type: custom:decluttering-card
    template: waste_badge_template
    variables:
      - entity: sensor.schadstoffe
    visibility:
      - condition: state
        entity: sensor.schadstoffe
        state:
          ["Schadstoffe in 2 days", "Schadstoffe in 1 days", "Schadstoffe in 0 days"]
  - type: custom:decluttering-card
    template: timer_badge_template
    variables:
      - entity: timer.nachtlicht
      - icon: mdi:lightbulb-night
    visibility:
      - condition: state
        entity: timer.nachtlicht
        state: "active"
  - type: custom:decluttering-card
    template: timer_badge_template
    variables:
      - entity: sensor.echo_show_nachster_timer
      - icon: mdi:fridge
    visibility:
      - condition: not
        conditions:
          - condition: state
            entity: sensor.echo_show_nachster_timer
            state: unavailable
  - type: custom:decluttering-card
    template: timer_badge_template
    variables:
      - entity: sensor.milos_dot_nachster_timer
      - icon: mdi:sofa
    visibility:
      - condition: not
        conditions:
          - condition: state
            entity: sensor.milos_dot_nachster_timer
            state: unavailable
  - type: custom:decluttering-card
    template: timer_badge_template
    variables:
      - entity: sensor.echo_buro_nachster_timer
      - icon: mdi:office-building
    visibility:
      - condition: not
        conditions:
          - condition: state
            entity: sensor.echo_buro_nachster_timer
            state: unavailable
  - type: custom:decluttering-card
    template: timer_badge_template
    variables:
      - entity: timer.climate_auto_off
      - icon: mdi:hvac
    visibility:
      - condition: state
        entity: timer.climate_auto_off
        state: "active"
  - type: custom:decluttering-card
    template: timer_badge_template
    variables:
      - entity: timer.heating_auto_off
      - icon: mdi:radiator
    visibility:
      - condition: state
        entity: timer.heating_auto_off
        state: "active"
  - type: custom:decluttering-card
    template: timer_badge_template
    variables:
      - entity: timer.maja_check
      - icon: mdi:dog
    visibility:
      - condition: state
        entity: timer.maja_check
        state: "active"

sections:
  - type: grid
    square: false
    cards:
      - !include ../../cards/nav-bar.yaml
      - !include ../../cards/residents.yaml
      - type: conditional
        conditions:
          - entity: sensor.home_aktuelle_warnstufe
            state_not: "0"
        card:
          type: custom:mushroom-template-card
          icon: mdi:cloud-alert
          icon_color: red
          primary: Aktuelle Wetterwarnungen
          secondary: >-
            {{ state_attr('sensor.home_aktuelle_warnstufe', 'warning_count') + state_attr('sensor.home_vorwarnstufe', 'warning_count') }} Warnung(en)
          tap_action:
            action: navigate
            navigation_path: dwd
  - type: grid
    square: false
    cards:
      - !include ../../cards/floorplan.yaml
      - type: custom:decluttering-card
        template: anniversary_template
        variables:
          - title: Urlaubscountdown
          - path: urlaub
          - icon: mdi:beach
      - type: custom:decluttering-card
        template: anniversary_template
        variables:
          - title: Geburtstage & Jahrestage
          - path: birthday
          - icon: mdi:gift
          - path2: special
  - type: grid
    square: false
    cards:
      - type: grid
        square: false
        cards:
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Haus
              - icon: mdi:home
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Hausbau
              - nav_path: details-bau
              - icon: mdi:crane
              - icon_color: yellow
          - type: conditional
            conditions:
              - entity: binary_sensor.jemand_in_spanien
                state: "on"
            card:
              type: custom:decluttering-card
              template: navigation_card_template
              variables:
                - title: Spanien
                - icon: mdi:beach
                - nav_path: spain
                - icon_color: red
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Wetter
              - icon: mdi:weather-partly-snowy-rainy
              - nav_path: details-weather
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Verbrauch
              - nav_path: consumption
              - icon: mdi:transmission-tower-export
              - icon_color: yellow
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Kameras
              - nav_path: cams
              - icon: mdi:cctv
              - icon_color: >-
                  {% if states('switch.security_kameras') == 'on' %}
                  green
                  {% else %}
                  grey
                  {% endif %}
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Einkaufen
              - nav_path: shopping
              - icon: mdi:cart
              - icon_color: cyan
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Kalender
              - nav_path: calendar
              - icon: mdi:calendar
              - icon_color: orange
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Einstellungen
              - nav_path: settings
              - icon: mdi:cog
              - icon_color: purple
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Karten
              - icon: mdi:map-search
              - nav_path: maps

          - type: conditional
            conditions:
              - entity: binary_sensor.workday_sensor
                state: "on"
            card:
              type: custom:decluttering-card
              template: navigation_card_template
              variables:
                - title: Arbeit
                - nav_path: work
                - icon: mdi:briefcase
                - icon_color: green
          - type: conditional
            conditions:
              - entity: binary_sensor.milo_kita
                state: "on"
            card:
              type: custom:decluttering-card
              template: navigation_card_template
              variables:
                - title: Kita
                - icon: mdi:baby
                - nav_path: kita
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Auto
              - nav_path: car
              - icon: mdi:car
              - icon_color: orange
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Multimedia
              - nav_path: multimedia
              - icon: mdi:multimedia
              - icon_color: purple
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Sport
              - nav_path: sport
              - icon: mdi:basketball
              - icon_color: yellow
          - type: custom:decluttering-card
            template: navigation_card_template
            variables:
              - title: Flüge
              - icon: mdi:airplane
              - nav_path: flights
          - type: custom:state-switch
            entity: user
            states:
              Miguel:
                type: custom:decluttering-card
                template: navigation_card_template
                variables:
                  - title: Netzwerk
                  - nav_path: network
                  - icon: mdi:network
                  - icon_color: red
  - type: grid
    column_span: 3
    cards:
      - type: custom:auto-entities
        show_empty: false
        column_span: 3
        card:
          type: vertical-stack
        card_param: cards
        filter:
          template: >-
            {% set ns = namespace(cards=[]) %}
            {% set is_workday = is_state('schedule.buro_tage', 'on') %}
            {% set weekdays = ['montag', 'dienstag', 'mittwoch', 'donnerstag', 'freitag', 'samstag', 'sonntag'] %}
            {% set today_weekday = weekdays[now().weekday()] %}
            {% set target_keywords = ['meal', 'kita', 'mittag', 'fruhstuck', 'abendessen'] %}
            {% set meal_order = {'fruhstuck': 0, 'kita': 1, 'mittag': 2, 'meal': 3, 'abendessen': 4} %}

            {% for img in states.image | rejectattr('state', 'in', ['unavailable', 'unknown']) %}
              {% set eid = img.entity_id %}

              {% if target_keywords | select('in', eid) | list | length > 0 %}
                {% set is_work = 'work' in eid %}
                {% set is_today = today_weekday in eid %}

                {% if (is_work and is_workday) or (not is_work and is_today) %}
                  {% set text_id = eid | replace('image.', 'input_text.') | replace('sensor.', 'input_text.') %}
                  {% set text_val = states(text_id) %}

                  {% if text_val and text_val | trim != '' and text_val not in ['unknown', 'unavailable'] %}

                    {% set icon = 'mdi:briefcase' if is_work else ('mdi:baby-bottle' if 'kita' in eid else 'mdi:food') %}
                    {% set sort_key = meal_order.get(meal_order.keys() | select('in', eid) | first, 99) %}

                    {% set ns.cards = ns.cards + [{
                      "type": "picture-glance",
                      "sort_key": sort_key,
                      "title": text_val,
                      "image_entity": eid,
                      "fit_mode": "cover",
                      "aspect_ratio": "16:9",
                      "entities": [{
                        "entity": text_id,
                        "name": "Dish",
                        "icon": icon,
                        "show_state": false
                      }]
                    }] %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% set sorted_cards = ns.cards | sort(attribute='sort_key') %}

            {% if sorted_cards | length > 0 %}
              {{ [
                {
                  "type": "custom:mushroom-title-card",
                  "title": "Heutiger Speiseplan"
                },
                {
                  "type": "custom:layout-card",
                  "layout_type": "custom:grid-layout",
                  "layout": {
                    "grid-template-columns": "repeat(auto-fit, minmax(250px, 1fr))",
                    "gap": "12px"
                  },
                  "cards": sorted_cards
                }
              ] }}
            {% else %}
              {{ [] }}
            {% endif %}
        grid_options:
          columns: full
