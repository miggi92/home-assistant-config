---
# Person template card
person_card_template:
  default:
    - title: Person Info
    - id: miguel
    - watch: default
    - watch_beacon: default
    - korbchen: default
    - beacon: default
    - eta_work: default
    - eta_home: default
  card:
    type: custom:mushroom-template-card
    entity_id: "[[entity]]"
    icon: mdi:account
    layout: horizontal
    primary: '{{ state_attr("[[entity]]", "friendly_name") }}'
    secondary: |-
      {% set basket_state = states("[[korbchen]]") %}
      {% set current_state = states("[[entity]]") | slugify %}
      {% set room_state = states("[[beacon]]") %}
      {% set floor_name = state_attr("[[beacon]]", "floor_name") %}
      {% set last_changed_time = states["[[entity]]"].last_changed %}
      {% if current_state == "home" %}
        {%- if room_state not in ["unknown", "not_home"] %}
          {{ room_state }} - {{ floor_name }}
        {%- elif basket_state == "on" %}
          Körbchen
        {%- endif %}
        Zu Hause seit {{ relative_time(last_changed_time) }}
      {% elif current_state in ["work_silke", "work_miguel"] %}
        Arbeiten seit {{ relative_time(last_changed_time) }}
      {% elif "handball" in current_state %}
        Beim Handball seit {{ relative_time(last_changed_time) }}
      {% elif current_state == "not_home" %}
        Abwesend seit {{ relative_time(last_changed_time) }}
      {% else %}
        {{ states("[[entity]]") }} seit {{ relative_time(last_changed_time) }}
      {% endif %}
    multiline_secondary: true
    picture: |-
      {% set is_driving = states("binary_sensor.[[phone]]_android_auto") %}
      {% set current_activity = states("sensor.[[phone]]_detected_activity") %}
      {% set current_state = states("[[entity]]") %}
      {% if is_driving == "on" or current_activity == "in_vehicle" %}
        /local/images/persons/[[id]]/auto.png
      {% elif current_state in ["work_silke", "work_miguel"] %}
        /local/images/persons/[[id]]/work.png
      {% elif "handball" in current_state %}
        /local/images/persons/[[id]]/sport.png
      {% elif current_state == "rewe" or "dm" in current_state or "getranke" in current_state %}
        /local/images/persons/[[id]]/shopping.png
      {% else %}
        /local/images/persons/[[id]].jpg
      {% endif %}
    badge_icon: |-
      {% set current_state = states("[[entity]]") | slugify %}
      {% set zone_icon = state_attr("zone." ~ current_state, "icon") %}
      {% if current_state == "home" %}
        mdi:home
      {% elif current_state == "not_home" %}
        mdi:run
      {% elif zone_icon %}
        {{ zone_icon }}
      {% else %}
        mdi:map-marker
      {% endif %}
    badge_color: |-
      {% set current_state = states("[[entity]]") | slugify %}
      {% if current_state == "home" %}
        green
      {% elif current_state == "not_home" %}
        red
      {% else %}
        grey
      {% endif %}
    tap_action:
      action: fire-dom-event
      browser_mod:
        service: browser_mod.popup
        data:
          title: "[[title]]"
          content:
            type: custom:vertical-stack-in-card
            cards:
              - type: entities
                entities:
                  - entity: "[[entity]]"
                    secondary_info: last-updated
                show_header_toggle: false
                state_color: false
              - type: history-graph
                entities:
                  - entity: "[[entity]]"
                hours_to_show: 24
                refresh_interval: 0
              - type: conditional
                conditions:
                  - entity: "[[entity]]"
                    state: home
                card:
                  type: custom:mushroom-chips-card
                  alignment: center
                  chips:
                    - type: entity
                      entity: "[[beacon]]"
                      icon: mdi:bluetooth
                    - type: entity
                      entity: "[[eta_work]]"
                      icon: mdi:car-clock
                    - type: template
                      entity: "sensor.[[phone]]_battery_level"
                      content: '{{ states("sensor.[[phone]]_battery_level") }} %'
                      icon: |-
                        {% set bat = states("sensor.[[phone]]_battery_level") | int(-1) %}
                        {% if bat >= 90 %} mdi:battery
                        {% elif bat >= 80 %} mdi:battery-80
                        {% elif bat >= 60 %} mdi:battery-60
                        {% elif bat >= 40 %} mdi:battery-40
                        {% elif bat >= 20 %} mdi:battery-20
                        {% else %} mdi:battery-outline
                        {% endif %}
                      icon_color: |-
                        {% set bat = states("sensor.[[phone]]_battery_level") | int(-1) %}
                        {% if bat >= 50 %}
                          green
                        {% elif bat >= 20 %}
                          orange
                        {% elif bat >= 0 %}
                          red
                        {% else %}
                          grey
                        {% endif %}
                      tap_action:
                        action: more-info
                    - type: template
                      entity: "sensor.[[phone]]_wi_fi_connection"
                      content: |-
                        {% set wifi = states("sensor.[[phone]]_wi_fi_connection") %}
                        {% if wifi == "<not connected>" or wifi == "unknown" %}
                          Off
                        {% else %}
                          {{ wifi | truncate(10, true, '...') }}
                        {% endif %}
                      icon: |-
                        {% set wifi = states("sensor.[[phone]]_wi_fi_connection") %}
                        {% if wifi == "<not connected>" or wifi == "unknown" %}
                          mdi:wifi-off
                        {% else %}
                          mdi:wifi
                        {% endif %}
              - type: conditional
                conditions:
                  - entity: "[[entity]]"
                    state_not: home
                card:
                  type: custom:mushroom-chips-card
                  alignment: center
                  chips:
                    - type: entity
                      entity: "[[eta_home]]"
                      icon: mdi:home-clock
                    - type: entity
                      entity: "sensor.[[phone]]_geocoded_location"
                    - type: template
                      entity: "sensor.[[phone]]_battery_level"
                      content: '{{ states("sensor.[[phone]]_battery_level") }} %'
                      icon: |-
                        {% set bat = states("sensor.[[phone]]_battery_level") | int(-1) %}
                        {% if bat >= 90 %} mdi:battery
                        {% elif bat >= 80 %} mdi:battery-80
                        {% elif bat >= 60 %} mdi:battery-60
                        {% elif bat >= 40 %} mdi:battery-40
                        {% elif bat >= 20 %} mdi:battery-20
                        {% else %} mdi:battery-outline
                        {% endif %}
                      icon_color: |-
                        {% set bat = states("sensor.[[phone]]_battery_level") | int(-1) %}
                        {% if bat >= 50 %}
                          green
                        {% elif bat >= 20 %}
                          orange
                        {% elif bat >= 0 %}
                          red
                        {% else %}
                          grey
                        {% endif %}
                      tap_action:
                        action: more-info
                    - type: template
                      entity: "sensor.[[phone]]_wi_fi_connection"
                      content: |-
                        {% set wifi = states("sensor.[[phone]]_wi_fi_connection") %}
                        {% if wifi == "<not connected>" or wifi == "unknown" %}
                          Off
                        {% else %}
                          {{ wifi | truncate(10, true, '...') }}
                        {% endif %}
                      icon: |-
                        {% set wifi = states("sensor.[[phone]]_wi_fi_connection") %}
                        {% if wifi == "<not connected>" or wifi == "unknown" %}
                          mdi:wifi-off
                        {% else %}
                          mdi:wifi
                        {% endif %}
              - type: conditional
                conditions:
                  - entity: "input_boolean.[[id]]_has_swatch"
                    state: "on"
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:mushroom-title-card
                      subtitle: Smartwatch
                    - type: custom:mushroom-chips-card
                      alignment: center
                      chips:
                        - type: entity
                          entity: "[[watch_beacon]]"
                          icon: mdi:bluetooth
                        - type: entity
                          entity: "sensor.[[watch]]_heart_rate"
                        - type: entity
                          entity: "sensor.[[watch]]_daily_steps"
                        - type: template
                          entity: "sensor.[[watch]]_battery_level"
                          content: '{{ states("sensor.[[watch]]_battery_level") }} %'
                          icon: |-
                            {% set bat = states("sensor.[[watch]]_battery_level") | int(-1) %}
                            {% if bat >= 90 %} mdi:battery
                            {% elif bat >= 80 %} mdi:battery-80
                            {% elif bat >= 60 %} mdi:battery-60
                            {% elif bat >= 40 %} mdi:battery-40
                            {% elif bat >= 20 %} mdi:battery-20
                            {% else %} mdi:battery-outline
                            {% endif %}
                          icon_color: |-
                            {% set bat = states("sensor.[[watch]]_battery_level") | int(-1) %}
                            {% if bat >= 50 %}
                              green
                            {% elif bat >= 20 %}
                              orange
                            {% elif bat >= 0 %}
                              red
                            {% else %}
                              grey
                            {% endif %}
                          tap_action:
                            action: more-info
              - type: map
                entities:
                  - entity: "[[entity]]"
                  - entity: zone.home
                  - entity: "[[work_zone]]"
                hours_to_show: 0
                aspect_ratio: "16:12"
