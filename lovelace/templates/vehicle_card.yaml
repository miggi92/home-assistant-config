---
# Vehicle card refined
vehicle_card_main:
  default:
    - sensor_prefix: ""
    - tracker_entity: ""
    - button_prefix: ""
    - switch_prefix: ""
  card:
    type: custom:stack-in-card
    mode: vertical
    keep:
      background: false
      box_shadow: false
      margin: false
      outer_padding: false
      border_radius: true
    cards:
      - type: custom:decluttering-card
        template: vehicle_chips_header
        variables:
          - sensor_prefix: "[[sensor_prefix]]"
          - tracker_entity: "[[tracker_entity]]"
          - button_prefix: "[[button_prefix]]"
      - type: custom:decluttering-card
        template: vehicle_messages_swipe
        variables:
          - sensor_prefix: "[[sensor_prefix]]"
          - button_prefix: "[[button_prefix]]"
      - type: custom:decluttering-card
        template: vehicle_main_stats
        variables:
          - sensor_prefix: "[[sensor_prefix]]"
          - switch_prefix: "[[switch_prefix]]"
      - type: custom:decluttering-card
        template: vehicle_charging_log
        variables:
          - sensor_prefix: "[[sensor_prefix]]"
      - type: custom:decluttering-card
        template: vehicle_progress_bars
        variables:
          - sensor_prefix: "[[sensor_prefix]]"
      - type: custom:decluttering-card
        template: vehicle_diagnostics_grid
        variables:
          - sensor_prefix: "[[sensor_prefix]]"
      - type: custom:decluttering-card
        template: vehicle_driving_grid
        variables:
          - sensor_prefix: "[[sensor_prefix]]"
