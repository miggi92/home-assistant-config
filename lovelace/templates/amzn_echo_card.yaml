---
# Amazon echo template card
amazon_echo_template:
  default:
    - title: Echo
    - icon: fab:amazon
  card:
    type: conditional
    conditions:
      - condition: state
        entity: media_player.[[echo_id]]
        state_not: unavailable
    card:
      type: vertical-stack
      cards:
        - type: custom:mushroom-title-card
          subtitle: "[[title]]"
          grid_options:
            columns: full
            rows: 1
        - type: custom:mini-media-player
          entity: media_player.[[echo_id]]
          artwork: cover
          icon: "[[icon]]"
          info: scroll
          idle_view:
            when_standby: true
          hide:
            name: true
            mute: true
            icon: true
            source: true
            power_state: false
          tts:
            platform: alexa
            entity_id: media_player.[[echo_id]]
        - type: grid
          square: false
          cards:
            - type: conditional
              conditions:
                - condition: state
                  entity: sensor.[[echo_id]]_nachster_timer
                  state_not: unavailable
                - condition: state
                  entity: sensor.[[echo_id]]_nachster_timer
                  state_not: unknown
              card:
                type: custom:mushroom-entity-card
                entity: sensor.[[echo_id]]_nachster_timer
                name: Nächster Timer
            - type: conditional
              conditions:
                - condition: state
                  entity: sensor.[[echo_id]]_nachster_wecker
                  state_not: unavailable
                - condition: state
                  entity: sensor.[[echo_id]]_nachster_wecker
                  state_not: unknown
              card:
                type: custom:mushroom-entity-card
                entity: sensor.[[echo_id]]_nachster_wecker
                name: Nächster Wecker
            - type: conditional
              conditions:
                - condition: state
                  entity: sensor.[[echo_id]]_nachste_erinnerung
                  state_not: unavailable
                - condition: state
                  entity: sensor.[[echo_id]]_nachste_erinnerung
                  state_not: unknown
              card:
                type: custom:mushroom-entity-card
                entity: sensor.[[echo_id]]_nachste_erinnerung
                name: Nächste Erinnerung
        - type: grid
          square: false
          columns: 2
          cards:
            - type: custom:mushroom-entity-card
              entity: switch.[[echo_id]]_bitte_nicht_storen
              name: DnD
              tap_action:
                action: toggle
