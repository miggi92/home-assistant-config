---
# PC Template card
pc_card_template:
  default:
    icon: mdi:desktop-tower-monitor
    switch_on_state: "Unlocked"
  card:
    type: custom:stack-in-card
    mode: vertical
    cards:
      - type: markdown
        content: |
          # <img height="50" src='[[picture]]' /> [[title]]
        card_mod:
          style:
            ha-markdown $: |
              h1 img {
                vertical-align: bottom;
              }
            .: |
              ha-card {
                background-color: transparent !important;
                box-shadow: none !important;
                margin-bottom: -15px;
                margin-top: -15px;
                text-align: center;
              }
      - type: custom:stack-in-card
        mode: horizontal
        card_mod:
          style: |
            ha-card {
              background: none;
              --ha-card-box-shadow: 0px;
            }
        cards:
          - type: custom:mushroom-template-card
            entity: "[[switch]]"
            primary: "[[title]]"
            secondary: >-
              {% set st = states('[[switch]]') %}
              {% if st == '[[switch_on_state]]' %}
                Uptime: {{ states('[[uptime]]') }}
              {% endif %}
            icon: "[[icon]]"
            badge_icon: >-
              {% if states('[[webcam]]') | lower in ['on', 'ein', 'true'] %}
                mdi:webcam
              {% else %}
                mdi:webcam-off
              {% endif %}
            fill_container: false
            multiline_secondary: false
            badge_color: >-
              {% if states('[[webcam]]') | lower in ['on', 'ein', 'true'] %}
                green
              {% else %}
                red
              {% endif %}
            icon_color: >-
              {% if states('[[switch]]') == '[[switch_on_state]]' %}
                blue
              {% else %}
                grey
              {% endif %}
          - type: custom:state-switch
            entity: "[[switch]]"
            states:
              "[[switch_on_state]]":
                type: custom:mushroom-chips-card
                alignment: end
                chips:
                  - type: conditional
                    conditions:
                      - entity: "[[cpu_load]]"
                        state_not: "unknown"
                      - entity: "[[cpu_load]]"
                        state_not: "unavailable"
                    chip:
                      type: template
                      entity: "[[cpu_load]]"
                      content: "{{ states(entity) | round(0, default=0) }} %"
                      icon_color: >-
                        {% set load = states(entity) | float(0) %}
                        {% if load < 40 %}
                          green
                        {% elif load < 70 %}
                          yellow
                        {% elif load < 85 %}
                          orange
                        {% else %}
                          red
                        {% endif %}
                      icon: mdi:cpu-64-bit
                      card_mod:
                        style: |
                          ha-card {
                            --chip-box-shadow: none;
                            --chip-background: none;
                            --chip-padding: 0 0.3em;
                            margin-top: 0.4em;
                            margin-right: 0.4em;
                            --chip-font-size: 0.4em;
                            --chip-icon-size: 0.6em;
                          }
                  - type: conditional
                    conditions:
                      - entity: "[[battery]]"
                        state_not: "unknown"
                      - entity: "[[battery]]"
                        state_not: "unavailable"
                    chip:
                      type: template
                      entity: "[[battery]]"
                      content: "{{ states(entity) }} %"
                      icon_color: >-
                        {% set bat = states(entity) | replace('%', '') | trim | float(0) %}
                        {% if bat < 15 %}
                          red
                        {% elif bat < 25 %}
                          deep-orange
                        {% elif bat < 30 %}
                          orange
                        {% elif bat < 60 %}
                          yellow
                        {% else %}
                          green
                        {% endif %}
                      icon: >-
                        {% if states('[[powerline]]') | lower == 'online' %}
                          mdi:battery-charging
                        {% else %}
                          mdi:battery
                        {% endif %}
                      card_mod:
                        style: |
                          ha-card {
                            --chip-box-shadow: none;
                            --chip-background: none;
                            --chip-padding: 0 0.3em;
                            margin-top: 0.4em;
                            margin-right: 0.4em;
                            --chip-font-size: 0.4em;
                            --chip-icon-size: 0.6em;
                          }
      - type: custom:state-switch
        entity: "[[switch]]"
        states:
          "[[switch_on_state]]":
            type: picture-glance
            camera_view: auto
            entities: []
            camera_image: "[[camera]]"
            theme: Mushroom
