---
vehicle_messages_swipe:
  default:
    - sensor_prefix: ""
    - button_prefix: ""
  card:
    type: conditional
    conditions:
      - entity: "[[sensor_prefix]]_messages"
        state_not: "0"
      - entity: "[[sensor_prefix]]_messages"
        state_not: "None"
    card:
      type: custom:swipe-card
      parameters:
        observer: true
        observeParents: true
        autoplay:
          delay: 4000
          disableOnInteraction: false
        pagination:
          type: bullets
      cards:
        - type: conditional
          conditions:
            - entity: "[[sensor_prefix]]_messages"
              state_not: "0"
          card:
            type: custom:mushroom-template-card
            primary: "{{ state_attr('[[sensor_prefix]]_messages', 'msg001_Subject') }}"
            secondary: "{{ state_attr('[[sensor_prefix]]_messages', 'msg001_Content') }}"
            icon: mdi:message-alert
            icon_color: orange
            multiline_secondary: true
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: "[[button_prefix]]_msgdeleteall"
            card_mod:
              style: |
                ha-card {
                  background: rgba(255, 152, 0, 0.1);
                  border-left: 4px solid #ff9800;
                  margin: 0px 15px 15px 15px;
                  box-shadow: none;
                }
        - type: conditional
          conditions:
            - entity: "[[sensor_prefix]]_messages"
              state_not: "0"
            - entity: "[[sensor_prefix]]_messages"
              state_not: "1"
          card:
            type: custom:mushroom-template-card
            primary: "{{ state_attr('[[sensor_prefix]]_messages', 'msg002_Subject') }}"
            secondary: "{{ state_attr('[[sensor_prefix]]_messages', 'msg002_Content') }}"
            icon: mdi:message-alert
            icon_color: orange
            multiline_secondary: true
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: "[[button_prefix]]_msgdeleteall"
            card_mod:
              style: |
                ha-card {
                  background: rgba(255, 152, 0, 0.1);
                  border-left: 4px solid #ff9800;
                  margin: 0px 15px 15px 15px;
                  box-shadow: none;
                }
