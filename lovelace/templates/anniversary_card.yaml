---
# Anniversary template card
# Untertemplate für eine einzelne Anniversary-Card
anniversary_card:
  default:
    - icon: mdi:calendar
    - icon_color: green
  card:
    type: custom:mushroom-template-card
    icon: "[[icon]]"
    entity: "[[entity]]"
    primary: >
      {% set years = state_attr(entity, 'years_at_anniversary') %}
      {{ state_attr(entity, 'friendly_name') }}{{ ' (' ~ years ~ ')' if years > 0 else '' }}
    icon_color: >
      {% set d = states(entity) | float(-1) %}
      {% if d < 0 %} disabled
      {% elif d == 0 %} purple
      {% elif d <= 3 %} red
      {% elif d <= 10 %} amber
      {% else %} green
      {% endif %}
    secondary: >
      {% set raw_days = states(entity) | float(-1) %}
      {% set d = raw_days | int(0) %}
      {% if raw_days < 0 %}
        –
      {% elif raw_days == 0 %}
        Heute 🎉
      {% elif raw_days < 1 %}
        {% set total_minutes = (raw_days * 24 * 60) | int %}
        {% set hours = total_minutes // 60 %}
        {% set minutes = total_minutes % 60 %}
        {% if hours == 0 and minutes == 0 %}Gleich
        {% else %}{{ "%d Std " % hours if hours > 0 else "" }}{{ "%d Min" % minutes if minutes > 0 else "" }}{% endif %}
      {% elif d == 1 %}
        Morgen
      {% elif d <= 6 %}
        in {{ d }} Tagen
      {% else %}
        {% set weeks = d // 7 %}
        {% set days = d % 7 %}
        {% set week_text = "1 Woche " if weeks == 1 else "%d Wochen " % weeks if weeks > 1 else "" %}
        {% set day_text = "1 Tag" if days == 1 else "%d Tage" % days if days > 1 else "" %}
        {{ week_text }}{{ day_text }}
      {% endif %}
    badge_icon: >
      {% set d = states(entity) | float(-1) %}
      {% if d == 0 %} mdi:party-popper
      {% elif d > 0 and d <= 3 %} mdi:exclamation-thick
      {% elif d > 3 and d <= 10 %} mdi:alert-outline
      {% endif %}
    badge_color: >
      {% set d = states(entity) | float(-1) %}
      {% if d == 0 %} purple
      {% elif d > 0 and d <= 3 %} red
      {% elif d > 3 and d <= 10 %} amber
      {% else %} transparent
      {% endif %}
    tap_action:
      action: more-info
    card_mod:
      style: |
        ha-card {
          {% set d = states(config.entity) | float(-1) %}
          {% set d = [d, 0] | max %}
          {% set lin = (90 - [d, 90] | min) / 90 %}
          {% set p = (lin * lin * 100) | round(1) %}
          {% set zone_color =
            '156,39,176' if d == 0 else
            '244,67,54'  if d <= 3 else
            '255,193,7'  if d <= 10 else
            '76,175,80' %}
          background: linear-gradient(
            to right,
            rgba({{ zone_color }}, 0.18) {{ p }}%,
            var(--ha-card-background, var(--card-background-color, white)) {{ p }}%
          ) !important;
        }
