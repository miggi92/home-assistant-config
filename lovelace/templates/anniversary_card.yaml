---
# Anniversary template card
# Untertemplate für eine einzelne Anniversary-Card
anniversary_card:
  default:
    - icon: mdi:calendar
    - icon_color: green
  card:
    type: custom:mushroom-template-card
    icon: "[[icon]]"
    entity: "[[entity]]"
    primary: >
      {% set years = state_attr(entity, 'years_at_anniversary') %}
      {{ state_attr(entity, 'friendly_name') }}{{ ' (' ~ years ~ ')' if years > 0 else '' }}
    icon_color: "[[icon_color]]"
    secondary: >
      {% set raw_days = states(entity) | float(-1) %}
      {% set remaining_days = raw_days | int(0) %}

      {% if raw_days == 0 %}
        Heute
      {% elif raw_days > 0 and raw_days < 1 %}
        {% set total_minutes = (raw_days * 24 * 60) | int %}
        {% set hours = total_minutes // 60 %}
        {% set minutes = total_minutes % 60 %}
        {{ "{} Stunden ".format(hours) if hours > 0 else "" }}{{ "{} Minuten".format(minutes) if minutes > 0 else "" }}
      {% elif remaining_days == 1 %}
        Morgen
      {% elif remaining_days > 1 %}
        {% set weeks = remaining_days // 7 %}
        {% set days = remaining_days % 7 %}
        {% set week_text = "1 Woche " if weeks == 1 else "{} Wochen ".format(weeks) if weeks > 1 else "" %}
        {% set day_text = "1 Tag" if days == 1 else "{} Tage".format(days) if days > 1 else "" %}
        {{ week_text }}{{ day_text }}
      {% endif %}
    badge_icon: >
      {% set remaining_days = states(entity) | int(0) %}
      {% if remaining_days > 0 and remaining_days <= 10 %}
        mdi:exclamation-thick
      {% elif remaining_days == 0 %}
        mdi:party-popper
      {% endif %}
    badge_color: >
      {% set remaining_days = states(entity) | int(0) %}
      {{ 'red' if remaining_days <= 10 else 'transparent' }}
    tap_action:
      action: more-info
    card_mod:
      style: |
        ha-card {
          {% set days_left = states(config.entity) | int(0) %}
          {% set progress_percent = ((90 - days_left) / 90 * 100) | round(1) %}
          background: linear-gradient(to right, color-mix(in srgb, [[icon_color]] 15%, transparent) {{ progress_percent }}%, var(--ha-card-background, var(--card-background-color, white)) {{ progress_percent }}%);
        }
