---
#
handballnet_next_game_card:
  variables:
    table_entity: sensor.sg_heuchelberg_wja_tabellenplatz
  show_name: false
  show_state: false
  show_icon: false
  styles:
    card:
      - padding: 12px
      - font-size: 14px
      - text-align: center
      - border-radius: 12px
      - box-shadow: 0 2px 6px rgba(0,0,0,0.3)
    grid:
      - grid-template-areas: |
          "home vs away"
          "homeName date awayName"
          "homeRecord info awayRecord"
          "bottom bottom bottom"
      - grid-template-columns: 1fr auto 1fr
      - grid-template-rows: auto auto auto auto
  custom_fields:
    home: |
      [[[
        const matchData = states[entity.entity_id].attributes.next_match;
        if (!matchData) return '';
        return `<img src="${matchData.home_team.logo}" height="50">`;
      ]]]
    away: |
      [[[
        const matchData = states[entity.entity_id].attributes.next_match;
        if (!matchData) return '';
        return `<img src="${matchData.away_team.logo}" height="50">`;
      ]]]
    vs: |
      [[[
        const matchData = states[entity.entity_id].attributes.next_match;
        if (!matchData) {
          const logoUrl = states[entity.entity_id].attributes.entity_picture;
          return `<img src="${logoUrl}" height="60">`;
        }
        return `🆚`;
      ]]]
    homeName: |
      [[[
        const matchData = states[entity.entity_id].attributes.next_match;
        if (!matchData) return '';
        return `<b>${matchData.home_team.name}</b>`;
      ]]]
    awayName: |
      [[[
        const matchData = states[entity.entity_id].attributes.next_match;
        if (!matchData) return '';
        return `<b>${matchData.away_team.name}</b>`;
      ]]]
    date: |
      [[[
        const matchData = states[entity.entity_id].attributes.next_match;
        if (!matchData) {
          const friendlyName = states[entity.entity_id].attributes.friendly_name;
          const teamName = friendlyName.replace(' Alle Spiele', '');
          return `<b>${teamName}</b>`;
        }
        const timestamp = new Date(matchData.starts_at_local);
        return timestamp.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit', year:'numeric' }) + '<br>' + timestamp.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      ]]]
    info: |
      [[[
        const matchData = states[entity.entity_id].attributes.next_match;
        if (!matchData) {
          const recentMatches = states[entity.entity_id].attributes.recent_matches;
          if (!recentMatches || recentMatches.length === 0) return '';
          const leagueName = recentMatches[0].tournament.name;
          return `🏆 ${leagueName}`;
        }
        return `📍 ${matchData.field}`;
      ]]]
    bottom: |
      [[[
        const matchData = states[entity.entity_id].attributes.next_match;
        if (!matchData) {
          const tableSensorId = variables.table_entity;
          const tableSensor = states[tableSensorId];
          const tableRank = tableSensor ? tableSensor.state : '?';
          return `📊 Tabellenplatz: ${tableRank}`;
        }
        const upcomingMatches = states[entity.entity_id].attributes.upcoming_matches;
        if (!upcomingMatches || upcomingMatches.length === 0) return '';
        return `🏆 ${upcomingMatches[0].tournament.name}`;
      ]]]
